<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perplexity - Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="brand">
        <h1>perplexity</h1>
      </header>

      <section class="search-area">
        <form class="search-box" action="#" method="get" role="search">
          <label for="q" class="visually-hidden">Search</label>
          <input id="q" name="q" type="search" placeholder="Type / for search modes" autocomplete="off" />
          <div class="controls">
            <button class="mode" type="button" aria-hidden="true">Search ▾</button>
            <button class="device" type="button" aria-hidden="true">Computer</button>
            <button class="mic" type="submit" aria-label="Search">🔍</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
