<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Begins</title>

    <link rel="stylesheet" href="styless.css">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>Where knowledge begins</h1>

    <p class="subtitle">
        Ask anything. Get answers backed by real-time sources.
    </p>

    <div class="search-box">

        <input type="text" placeholder="Ask anything...">

        <div class="bottom-row">

            <div class="left-icons">

                <button><i class="ri-search-line"></i></button>

                <button><i class="ri-shapes-line"></i></button>

                <button><i class="ri-global-line"></i></button>

                <button><i class="ri-attachment-2"></i></button>

            </div>

            <div class="right-icons">

                <button class="voice">
                    <i class="ri-mic-line"></i>
                </button>

                <button class="send">
                    <i class="ri-arrow-right-line"></i>
                </button>

            </div>

        </div>

    </div>

    <div class="menu">

        <button class="active">
            <i class="ri-search-line"></i>
            Ask
        </button>

        <button>
            <i class="ri-brain-line"></i>
            Research
        </button>

        <button>
            <i class="ri-pencil-line"></i>
            Write
        </button>

        <button>
            <i class="ri-bar-chart-box-line"></i>
            Analyze
        </button>

        <button>
            <i class="ri-command-line"></i>
            Solve
        </button>

    </div>

</div>

</body>
</html>
